      summary: 'Grant a permission on a template to a role, department, or team.'
      operationId: grantAPermissionOnATemplateToARoleDepartmentOrTeam
      description: 'Admin only. Duplicate grants are silently ignored (idempotent).'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  description: ''
                  example: view
                  enum:
                    - view
                    - create
                    - edit
                permissible_type:
                  type: string
                  description: ''
                  example: role
                  enum:
                    - role
                    - department
                    - team
                permissible_id:
                  type: integer
                  description: ''
                  example: 17
              required:
